name: Test jac-loadtest

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('jac_loadtest_cli/jac.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install jaclang jac-scale
          pip install pytest>=8.0 pytest-asyncio>=0.23 pytest-mock>=3.12 "aiohttp[speedups]>=3.9"

      - name: Run unit tests
        working-directory: jac_loadtest_cli
        run: pytest -m unit -v

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test-unit

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('jac_loadtest_cli/jac.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install jaclang jac-scale
          pip install pytest>=8.0 pytest-asyncio>=0.23 pytest-mock>=3.12 "aiohttp[speedups]>=3.9"

      - name: Run integration tests
        working-directory: jac_loadtest_cli
        run: pytest -m integration -v

