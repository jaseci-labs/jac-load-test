name: Release jac-loadtest-cli to PyPI

on:
  push:
    branches:
      - main

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(grep '^version = ' jac_loadtest_cli/jac.toml | sed 's/version = "\(.*\)"/\1/')
          PREVIOUS=$(git show HEAD~1:jac_loadtest_cli/jac.toml 2>/dev/null | grep '^version = ' | sed 's/version = "\(.*\)"/\1/' || echo "none")
          echo "current=$CURRENT"
          echo "previous=$PREVIOUS"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Set up Python 3.12
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jac tooling
        if: steps.version.outputs.changed == 'true'
        run: pip install jaclang twine

      - name: Tag release
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Build package
        if: steps.version.outputs.changed == 'true'
        working-directory: jac_loadtest_cli
        run: jac bundle

      - name: Publish to PyPI
        if: steps.version.outputs.changed == 'true'
        run: twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
