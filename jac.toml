[project]
name = "jac-loadtest-cli"
version = "0.2.2"
description = "HAR-based load testing library for jac-scale applications — Jac-native rewrite of jac-loadtest."
authors = [{ name = "Jaseci Labs", email = "hello@jaseci.org" }]
maintainers = [{ name = "Jaseci Labs", email = "hello@jaseci.org" }]
license = "MIT"
readme = "README.md"
keywords = ["load-testing", "har", "jac", "jaclang", "jaseci", "jac-scale", "performance"]
requires-python = ">=3.12"

[project.urls]
repository = "https://github.com/jaseci-labs/jaseci"
homepage = "https://jaseci.org"
documentation = "https://jac-lang.org"
source = "https://github.com/jaseci-labs/jaseci/tree/main/jac-loadtest-cli"
issues = "https://github.com/jaseci-labs/jaseci/issues"
changelog = "https://github.com/jaseci-labs/jaseci/blob/main/docs/docs/community/release_notes/jac-loadtest.md"

[project.include]
packages = ["jac_loadtest_cli"]

[project.include.data]
jac_loadtest_cli = ["templates/*.html"]

[dependencies]
jac-scale = ">=0.2.16"
aiohttp = ">=3.9.0,<4.0.0"
rich = ">=13.0.0"
requests = ">=2.28.0"

[dev-dependencies]
pytest = ">=8.0"
pytest-asyncio = ">=0.23"
pytest-mock = ">=3.12"

[optional-dependencies.test]
pytest = ">=8.0"
pytest-asyncio = ">=0.23"
pytest-mock = ">=3.12"
"aiohttp[speedups]" = ">=3.9.0,<4.0.0"

[entrypoints.jac]
loadtest = "jac_loadtest_cli.plugin:loadtest"
